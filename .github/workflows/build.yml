name: Build GitNexus for Linux Offline

on:
  workflow_dispatch: # 允许你手动点击按钮触发任务

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 免费的官方纯正 Linux (x64) 环境

    steps:
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 初始化并安装 GitNexus
        run: |
          mkdir gitnexus-linux-pack
          cd gitnexus-linux-pack
          npm init -y
          # 在真实的 Linux 环境下安装，绝对能完美拉取到 Linux 版的 C++ 底层预编译文件！
          npm install gitnexus

      - name: 压缩为 TAR.GZ (完美保留软链接和权限)
        run: |
          cd gitnexus-linux-pack
          # 用 tar 打包，保留所有的 Linux 快捷方式和权限
          tar -czvf ../gitnexus-linux-offline.tar.gz .
      
      - name: 上传打包好的文件供下载
        uses: actions/upload-artifact@v4
        with:
          name: GitNexus-Linux-Offline-Package
          path: gitnexus-linux-offline.tar.gz
          retention-days: 3
